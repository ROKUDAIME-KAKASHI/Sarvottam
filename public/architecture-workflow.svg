<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="100%" height="100%" style="background-color: #0f172a; font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="success-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="warning-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>

    <!-- Filters for Glow Effects -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3" flood-color="#000" />
    </filter>

    <!-- Markers for arrows -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
    <marker id="arrow-primary" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bg-grad)" />
  
  <!-- Grid Pattern Overlay -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.05" />
  </pattern>
  <rect width="1200" height="900" fill="url(#grid)" />

  <!-- Title Section -->
  <text x="600" y="80" fill="#ffffff" font-size="42" font-weight="bold" text-anchor="middle" letter-spacing="2">SARVOTTAM ECOSYSTEM</text>
  <text x="600" y="115" fill="#94a3b8" font-size="20" text-anchor="middle">Architecture &amp; Workflow Diagram</text>

  <!-- ==================== ARCHITECTURE SECTION ==================== -->
  <!-- Main Architecture Container -->
  <rect x="50" y="160" width="1100" height="280" rx="16" fill="#1e293b" fill-opacity="0.7" stroke="#334155" stroke-width="2" filter="url(#shadow)" />
  <text x="70" y="195" fill="#e2e8f0" font-size="24" font-weight="bold" letter-spacing="1">System Architecture</text>

  <!-- Client Layer (Frontend) -->
  <rect x="100" y="220" width="280" height="180" rx="12" fill="#0f172a" stroke="#3b82f6" stroke-width="2" />
  <text x="240" y="250" fill="#3b82f6" font-size="18" font-weight="bold" text-anchor="middle">CLIENT TIER</text>
  <text x="240" y="275" fill="#94a3b8" font-size="14" text-anchor="middle">React 19 &amp; Next.js App Router</text>
  
  <rect x="120" y="295" width="240" height="35" rx="6" fill="#1e293b" />
  <text x="240" y="318" fill="#e2e8f0" font-size="14" text-anchor="middle">Tailwind CSS v4 + Framer Motion</text>
  
  <rect x="120" y="340" width="240" height="35" rx="6" fill="#1e293b" />
  <text x="240" y="363" fill="#e2e8f0" font-size="14" text-anchor="middle">shadcn/ui Components</text>

  <!-- Server Layer (Backend) -->
  <rect x="460" y="220" width="280" height="180" rx="12" fill="#0f172a" stroke="#8b5cf6" stroke-width="2" />
  <text x="600" y="250" fill="#8b5cf6" font-size="18" font-weight="bold" text-anchor="middle">SERVER TIER</text>
  <text x="600" y="275" fill="#94a3b8" font-size="14" text-anchor="middle">Next.js Server Components / APIs</text>

  <rect x="480" y="295" width="240" height="35" rx="6" fill="#1e293b" />
  <text x="600" y="318" fill="#e2e8f0" font-size="14" text-anchor="middle">NextAuth.js (Role-based Auth)</text>

  <rect x="480" y="340" width="240" height="35" rx="6" fill="#1e293b" />
  <text x="600" y="363" fill="#e2e8f0" font-size="14" text-anchor="middle">Prisma ORM (Data Access)</text>

  <!-- Database Layer -->
  <rect x="820" y="220" width="280" height="180" rx="12" fill="#0f172a" stroke="#10b981" stroke-width="2" />
  <text x="960" y="250" fill="#10b981" font-size="18" font-weight="bold" text-anchor="middle">DATA TIER</text>
  <text x="960" y="275" fill="#94a3b8" font-size="14" text-anchor="middle">SQLite (Dev) / Production DB</text>

  <!-- Database Cylinder Graphic -->
  <path d="M 900 320 C 900 310, 1020 310, 1020 320 L 1020 370 C 1020 380, 900 380, 900 370 Z" fill="#1e293b" stroke="#10b981" stroke-width="1.5" />
  <path d="M 900 320 C 900 330, 1020 330, 1020 320" fill="none" stroke="#10b981" stroke-width="1.5" />
  <text x="960" y="355" fill="#e2e8f0" font-size="14" text-anchor="middle">User, Project, Problem Data</text>

  <!-- Architecture Connecting Arrows -->
  <path d="M 380 310 L 450 310" fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrow)" />
  <path d="M 450 320 L 380 320" fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrow)" />
  <text x="415" y="300" fill="#94a3b8" font-size="12" text-anchor="middle">RSC / Actions</text>

  <path d="M 740 310 L 810 310" fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrow)" />
  <path d="M 810 320 L 740 320" fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrow)" />
  <text x="775" y="300" fill="#94a3b8" font-size="12" text-anchor="middle">Queries</text>


  <!-- ==================== WORKFLOW SECTION ==================== -->
  <!-- Main Workflow Container -->
  <rect x="50" y="470" width="1100" height="390" rx="16" fill="#1e293b" fill-opacity="0.7" stroke="#334155" stroke-width="2" filter="url(#shadow)" />
  <text x="70" y="505" fill="#e2e8f0" font-size="24" font-weight="bold" letter-spacing="1">Problem-to-Project Lifecycle</text>

  <!-- Roles Legend -->
  <rect x="70" y="530" width="15" height="15" rx="3" fill="#f59e0b" />
  <text x="95" y="542" fill="#cbd5e1" font-size="12">Industry Partner</text>
  
  <rect x="220" y="530" width="15" height="15" rx="3" fill="#ef4444" />
  <text x="245" y="542" fill="#cbd5e1" font-size="12">Super Admin</text>

  <rect x="350" y="530" width="15" height="15" rx="3" fill="#3b82f6" />
  <text x="375" y="542" fill="#cbd5e1" font-size="12">Faculty / Mentor</text>

  <rect x="500" y="530" width="15" height="15" rx="3" fill="#10b981" />
  <text x="525" y="542" fill="#cbd5e1" font-size="12">Student</text>

  <!-- Flow Nodes -->
  <!-- Node 1: Problem Submission -->
  <rect x="100" y="600" width="200" height="80" rx="10" fill="#0f172a" stroke="#f59e0b" stroke-width="2" filter="url(#glow)" />
  <text x="200" y="635" fill="#f59e0b" font-size="16" font-weight="bold" text-anchor="middle">1. Problem Submission</text>
  <text x="200" y="655" fill="#94a3b8" font-size="12" text-anchor="middle">Industry Submits Real-World Issue</text>

  <!-- Path 1 -> 2 -->
  <path d="M 300 640 L 370 640" fill="none" stroke="#8b5cf6" stroke-width="4" marker-end="url(#arrow-primary)" />

  <!-- Node 2: Tri-level Approval -->
  <rect x="380" y="580" width="220" height="120" rx="10" fill="#0f172a" stroke="#ef4444" stroke-width="2" />
  <text x="490" y="610" fill="#ef4444" font-size="16" font-weight="bold" text-anchor="middle">2. Ecosystem Approval</text>
  <rect x="400" y="625" width="180" height="20" rx="4" fill="#1e293b" />
  <text x="490" y="639" fill="#cbd5e1" font-size="11" text-anchor="middle">Admin Verification</text>
  <rect x="400" y="649" width="180" height="20" rx="4" fill="#1e293b" />
  <text x="490" y="663" fill="#cbd5e1" font-size="11" text-anchor="middle">Faculty Validation</text>
  <rect x="400" y="673" width="180" height="20" rx="4" fill="#1e293b" />
  <text x="490" y="687" fill="#cbd5e1" font-size="11" text-anchor="middle">Industry Confirmation</text>

  <!-- Path 2 -> 3 -->
  <path d="M 600 640 L 670 640" fill="none" stroke="#8b5cf6" stroke-width="4" marker-end="url(#arrow-primary)" />

  <!-- Node 3: Project Creation -->
  <rect x="680" y="600" width="200" height="80" rx="10" fill="#0f172a" stroke="#3b82f6" stroke-width="2" filter="url(#glow)" />
  <text x="780" y="635" fill="#3b82f6" font-size="16" font-weight="bold" text-anchor="middle">3. Project Initiation</text>
  <text x="780" y="655" fill="#94a3b8" font-size="12" text-anchor="middle">Problem Promoted to Active Project</text>

  <!-- Path 3 -> 4 (Downwards) -->
  <path d="M 780 680 L 780 730" fill="none" stroke="#8b5cf6" stroke-width="4" marker-end="url(#arrow-primary)" />

  <!-- Node 4: Student Application -->
  <rect x="680" y="740" width="200" height="80" rx="10" fill="#0f172a" stroke="#10b981" stroke-width="2" filter="url(#glow)" />
  <text x="780" y="775" fill="#10b981" font-size="16" font-weight="bold" text-anchor="middle">4. Student Enrollment</text>
  <text x="780" y="795" fill="#94a3b8" font-size="12" text-anchor="middle">Apply &amp; Mentor Approves</text>

  <!-- Path 4 -> 5 (Leftwards) -->
  <path d="M 680 780 L 610 780" fill="none" stroke="#8b5cf6" stroke-width="4" marker-end="url(#arrow-primary)" />

  <!-- Node 5: Collaboration & Research -->
  <rect x="380" y="740" width="220" height="80" rx="10" fill="#0f172a" stroke="#a855f7" stroke-width="2" />
  <text x="490" y="775" fill="#a855f7" font-size="16" font-weight="bold" text-anchor="middle">5. Collaborative Research</text>
  <text x="490" y="795" fill="#94a3b8" font-size="12" text-anchor="middle">Document Uploads &amp; Milestone Tracking</text>

  <!-- Path 5 -> 6 -->
  <path d="M 380 780 L 310 780" fill="none" stroke="#8b5cf6" stroke-width="4" marker-end="url(#arrow-primary)" />

  <!-- Node 6: Resolution & Cert -->
  <rect x="100" y="740" width="200" height="80" rx="10" fill="#0f172a" stroke="#ec4899" stroke-width="2" filter="url(#glow)" />
  <text x="200" y="775" fill="#ec4899" font-size="16" font-weight="bold" text-anchor="middle">6. Resolution &amp; Rewards</text>
  <text x="200" y="795" fill="#94a3b8" font-size="12" text-anchor="middle">Certificates Issued to Students</text>

</svg>
